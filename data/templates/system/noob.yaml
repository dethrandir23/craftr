name: "noob"
description: "noobish C++ project template"

variables:
  PROJECT_NAME: "{{PROJECT_NAME}}"
  AUTHOR_NAME: "{{AUTHOR_NAME}}"
  DATE: "DATE"

subfolders:
  - include
  - src
  - metadata

files:
  - target: "CMakeLists.txt"
    template: "cmake/CMake_Template.txt"
  - target: "src/main.cpp"
    template: "cpp/main.txt"
  - target: "README.md"
    template: "readme/Readme.txt"
  - target: "LICENSE"
    template: "license"
  - target: "metadata/metadata.json"
    template: "metadata/metadata.txt"


command_mode: idk
silent_mode: yes

commands:
  - "cd {{PROJECT_NAME}} && git init"
  - command: "cd {{PROJECT_NAME}} && git add ."
    description: "Staging files for first commit..."
  - command: "cd {{PROJECT_NAME}} && git commit -m 'Initial commit'"
    description: "Creating first commit..."